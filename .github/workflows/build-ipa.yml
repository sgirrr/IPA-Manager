name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          XCODE=$(ls /Applications | grep -E 'Xcode_[0-9]+' | sort -V | tail -1)
          sudo xcode-select -s "/Applications/${XCODE:-Xcode.app}/Contents/Developer"
          xcodebuild -version

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          cat > project.yml << 'YAML'
          name: IPAManager
          options:
            bundleIdPrefix: com.ipamanager
            deploymentTarget:
              iOS: "15.0"
          settings:
            base:
              SWIFT_VERSION: "5.7"
          targets:
            IPAManager:
              type: application
              platform: iOS
              sources:
                - Sources/IPAManager
              settings:
                base:
                  INFOPLIST_FILE: Sources/IPAManager/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.ipamanager.app
                  DEVELOPMENT_TEAM: ""
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGN_IDENTITY: iPhone Developer
                  PROVISIONING_PROFILE_SPECIFIER: ""
              dependencies:
                - package: ZIPFoundation
          packages:
            ZIPFoundation:
              url: https://github.com/weichsel/ZIPFoundation
              from: 0.9.16
          YAML
          xcodegen generate

      - name: Build for device (unsigned)
        run: |
          xcodebuild -project IPAManager.xcodeproj \
                     -scheme IPAManager \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGN_ENTITLEMENTS="" \
                     OTHER_CODE_SIGN_FLAGS="--no-strict"

      - name: Package IPA
        run: |
          mkdir -p output/Payload
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" output/Payload/
            cd output
            zip -qr "../IPAManager.ipa" Payload/
            cd ..
            echo "✅ IPA created ($(du -h IPAManager.ipa | cut -f1))"
          else
            echo "⚠️ .app not found"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IPAManager.ipa
          path: IPAManager.ipa
